const CLIENT_ID  = "36e274f3-5442-426e-a11a-c434233498b9";
const SCOPES     = ["User.Read", "Calendars.ReadWrite", "Files.ReadWrite.All"];
const GRAPH_ROOT = "https://graph.microsoft.com/v1.0";
const DATA_PATH  = `${GRAPH_ROOT}/me/drive/root:/forgetrack-data.json:/content`;

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: "https://login.microsoftonline.com/consumers",
    redirectUri: window.location.origin + window.location.pathname.replace(/\/$/, "") + "/",
  },
  cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true },
};

let _msalApp = null;
let _msalInitPromise = null;
async function getMsalApp() {
  if (!_msalApp) {
    _msalApp = new window.msal.PublicClientApplication(msalConfig);
    _msalInitPromise = _msalApp.initialize();
  }
  await _msalInitPromise;
  return _msalApp;
}

async function getToken() {
  const app = await getMsalApp();
  const accounts = app.getAllAccounts();
  if (!accounts.length) throw Object.assign(new Error("Not signed in"), { needsLogin: true });
  try {
    const r = await app.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch {
    // Silent refresh failed — signal the app to send the user back to sign-in.
    // Do NOT fall back to popup here: iOS PWA blocks popups without a user gesture.
    throw Object.assign(new Error("Session expired — please sign in again"), { needsLogin: true });
  }
}

async function graphFetch(url, opts = {}) {
  const token = await getToken();
  const method = (opts.method || "GET").toUpperCase();
  const baseHeaders = { Authorization: `Bearer ${token}` };
  if (method !== "GET") baseHeaders["Content-Type"] = "application/json";
  return fetch(url.startsWith("http") ? url : `${GRAPH_ROOT}${url}`, {
    ...opts,
    headers: { ...baseHeaders, ...(opts.headers || {}) },
  });
}

// ============================================================
// ONEDRIVE STORAGE
// ============================================================
async function loadFromOneDrive() {
  const res = await graphFetch(DATA_PATH);
  if (res.status === 404) return null; // no file yet — caller preserves existing state
  if (!res.ok) {
    const body = await res.text().catch(() => "");
    const detail = body ? ` — ${body.slice(0, 120)}` : "";
    throw new Error(`Load failed (${res.status})${detail}`);
  }
  return res.json();
}

let saveTimer = null;
function saveToOneDrive(data) {
  clearTimeout(saveTimer);
  return new Promise(resolve => {
    saveTimer = setTimeout(async () => {
      try {
        const res = await graphFetch(DATA_PATH, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        if (!res.ok) throw new Error(`Save failed (${res.status})`);
        resolve(true);
      } catch (e) { console.warn("Save failed:", e); resolve(false); }
    }, 1500);
  });
}

const WIN_TIMES   = { morning: [5, 0], office: [15, 30], evening: [20, 30] };
const WIN_LABELS  = { morning: "Morning (~5:00 AM)", office: "Office (~3:30 PM)", evening: "Evening (~8:30 PM)" };
const GRAPH_DAYS  = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
const DAYS_FULL   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAYS_SHORT  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

async function createOutlookEvents(days, timeWindow) {
  const [hour, minute] = WIN_TIMES[timeWindow];
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const pad = n => String(n).padStart(2, "0");

  const promises = days.map(dayIdx => {
    const today = new Date();
    const diff  = ((dayIdx - today.getDay() + 7) % 7) || 7;
    const d     = new Date(today);
    d.setDate(today.getDate() + diff);
    const dateStr  = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const startStr = `${dateStr}T${pad(hour)}:${pad(minute)}:00`;
    const endStr   = `${dateStr}T${pad(hour+1)}:${pad(minute)}:00`;

    return graphFetch("/me/events", {
      method: "POST",
      body: JSON.stringify({
        subject: "ForgeTrack — Workout 💪",
        body: { contentType: "text", content: "Home gym session.\n\nStay consistent — Logan and Rowan are counting on you.\n\nPowered by ForgeTrack." },
        start: { dateTime: startStr, timeZone: tz },
        end:   { dateTime: endStr,   timeZone: tz },
        recurrence: {
          pattern: { type: "weekly", interval: 1, daysOfWeek: [GRAPH_DAYS[dayIdx]] },
          range:   { type: "noEnd", startDate: dateStr },
        },
        reminderMinutesBeforeStart: 30,
        isReminderOn: true,
        categories: ["ForgeTrack"],
      }),
    });
  });

  const results = await Promise.allSettled(promises);
  const failed  = results.filter(r => r.status === "rejected" || (r.value && !r.value.ok));
  if (failed.length) throw new Error(`${failed.length} event(s) failed to create`);
}

// Parse a stored date string as LOCAL midnight, regardless of whether it's
// a full ISO timestamp (legacy) or a YYYY-MM-DD date-only string (new).
function parseLocalDate(dateStr) {
  if(!dateStr) return new Date(NaN);
  if(dateStr.length === 10) {
    const [y,m,d] = dateStr.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  const d = new Date(dateStr);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
// Return today's date as YYYY-MM-DD in the device's LOCAL timezone.
function localDateStr(d=new Date()){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getStreak(w) {
  if(!w.length) return 0;
  const today=new Date(); today.setHours(0,0,0,0);
  const days=new Set(w.map(x=>{const d=parseLocalDate(x.date);d.setHours(0,0,0,0);return d.getTime();}));
  const tryFrom=s=>{let n=0,d=new Date(s);while(days.has(d.getTime())){n++;d.setDate(d.getDate()-1);}return n;};
  const s=tryFrom(today); if(s>0) return s;
  const yest=new Date(today); yest.setDate(yest.getDate()-1); return tryFrom(yest);
}
function getWeekCount(w) {
  const s=new Date(); s.setDate(s.getDate()-s.getDay()); s.setHours(0,0,0,0);
  return w.filter(x=>parseLocalDate(x.date)>=s).length;
}
function getLevelInfo(xp) {
  let curr=LEVELS[0]; for(const l of LEVELS){if(xp>=l.min)curr=l;}
  const next=LEVELS.find(l=>l.min>xp);
  return {...curr, next, prog:next?(xp-curr.min)/(next.min-curr.min):1};
}
function calcBMI(lbs,inches){return inches>0?((lbs*703)/(inches**2)).toFixed(1):"--";}
function bmiCategory(bmi){
  const b=parseFloat(bmi);
  if(isNaN(b))return{label:"--",col:C.muted};
  if(b<18.5)return{label:"Underweight",col:C.blue};
  if(b<25)return{label:"Normal",col:C.teal};
  if(b<30)return{label:"Overweight",col:C.gold};
  return{label:"Obese",col:C.red};
}
function todayStr(){return localDateStr();}
function countWaterGoalDays(log=[]){
  const m={};for(const e of log){const d=localDateStr(parseLocalDate(e.date));m[d]=(m[d]||0)+e.glasses;}
  return Object.values(m).filter(v=>v>=WATER_GOAL).length;
}
function countGoodSleepDays(log=[]){return log.filter(e=>e.hours>=7).length;}
function fmt(s){return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}
function suggestWorkout(win,energy){
  const pool=WL[win]||[];
  const m=pool.filter(w=>energy>=(w.energyMin||1)&&energy<=(w.energyMax||5));
  return m.length?m[Math.floor(Math.random()*m.length)]:pool[0];
}
function buildHIITSeq(wo){
  const seq=[];
  for(const ex of wo.exercises){const r=ex.rounds||3;for(let i=0;i<r;i++){seq.push({name:ex.name,note:ex.note,phase:"work",time:wo.workSec,round:i+1,totalRounds:r});seq.push({name:ex.name,note:ex.note,phase:"rest",time:wo.restSec,round:i+1,totalRounds:r});}}
  if(seq.length&&seq[seq.length-1].phase==="rest")seq.pop();
  return seq;
}

        <div style={{fontSize:15,lineHeight:1.55,fontStyle:"italic",color:C.text}}>"{msg.line}"</div>

            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:34,color:s.col,lineHeight:1}}>{s.val}</div>
            <div style={{fontSize:9,color:C.muted,letterSpacing:1.5,fontWeight:700,marginTop:2,lineHeight:1.3}}>{s.sub}</div>
          </div>
        ))}
      </div>

      <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:2}}>THIS WEEK</div>
          <div style={{fontSize:12,color:week>=WEEKLY_GOAL?C.teal:C.orange,fontWeight:700}}>{week} / {WEEKLY_GOAL}</div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          {Array.from({length:WEEKLY_GOAL}).map((_,i)=>{const done=i<week;const col=done?(week>=WEEKLY_GOAL?C.teal:C.orange):"#2A2A2A";return <div key={i} style={{width:52,height:52,borderRadius:"50%",background:col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:done?20:16,fontFamily:"'Bebas Neue',sans-serif",color:done?"#fff":C.muted,border:`2px solid ${done?col:"#333"}`,transition:"all 0.4s"}}>{done?"✓":i+1}</div>;})}
        </div>
        {week>=WEEKLY_GOAL&&<div style={{textAlign:"center",fontSize:11,color:C.teal,fontWeight:700,letterSpacing:2,marginTop:10}}>WEEKLY GOAL CRUSHED ⚡</div>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <div style={{background:C.card,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:C.text,lineHeight:1}}>{latestWeight||"--"}</div>
          <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginTop:2}}>LBS</div>
        </div>
        <div style={{background:C.card,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:bmiCol,lineHeight:1}}>{bmi||"--"}</div>
          <div style={{fontSize:9,color:bmiCol,letterSpacing:1,marginTop:2}}>{bmiLabel==="--"?"BMI":bmiLabel.toUpperCase()}</div>
        </div>
        <div style={{background:C.card,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:lastSleep.hours>=7?C.teal:lastSleep.hours?C.gold:C.muted,lineHeight:1}}>{lastSleep.hours||"--"}</div>
          <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginTop:2}}>HRS SLEEP</div>
        </div>
        <div style={{background:C.card,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:todaySteps>=STEPS_GOAL?C.teal:todaySteps>0?C.orange:C.muted,lineHeight:1}}>{todaySteps>0?todaySteps>=1000?`${(todaySteps/1000).toFixed(1)}k`:String(todaySteps):"--"}</div>

        </div>
      </div>

      <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:2}}>💧 TODAY'S WATER</div>
          <div style={{fontSize:12,color:todayWater>=WATER_GOAL?C.teal:C.blue,fontWeight:700}}>{todayWater} / {WATER_GOAL}</div>
        </div>
        <XPBar prog={todayWater/WATER_GOAL} color={C.blue} h={8}/>
        {todayWater>=WATER_GOAL&&<div style={{fontSize:11,color:C.teal,fontWeight:700,letterSpacing:2,marginTop:6}}>HYDRATED ✓</div>}
      </div>

      <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:2}}>LEVEL {lvl} — {lvlName}</div>
          {nextLvl?<div style={{fontSize:11,color:C.muted}}>{nextLvl.min-data.totalXP} XP → {nextLvl.name}</div>:<div style={{fontSize:11,color:C.gold}}>MAX RANK</div>}
        </div>
        <XPBar prog={lvlProg} color={C.gold}/>
      </div>

      {lastW&&(
        <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:8}}>LAST WORKOUT</div>

              <div style={{display:"flex",gap:8,alignItems:"center"}}><TypeBadge type={lastW.type}/><span style={{fontSize:11,color:C.muted}}>{new Date(lastW.date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})} · {lastW.duration}m</span></div>

          </div>
        </div>

        📅 SCHEDULE & OUTLOOK CALENDAR
      </button>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,paddingBottom:4}}>
        <div style={{fontSize:10,color:"#444"}}>{userEmail}</div>
        <button onClick={onSignOut} style={{background:"none",border:"none",fontSize:10,color:C.muted,cursor:"pointer",letterSpacing:1,padding:"2px 0",textDecoration:"underline"}}>SIGN OUT</button>
      </div>
    </div>
  );
}

function StepsSection({data,onSave}){
  const [steps,setSteps]=useState("");
  const log=data.stepsLog||[];
  const todayLog=log.filter(e=>localDateStr(parseLocalDate(e.date))===todayStr());
  const todaySteps=todayLog.length?todayLog[todayLog.length-1].steps:0;
  const doLog=()=>{
    const s=parseInt(steps);if(isNaN(s)||s<0||s>99999)return;
    onSave({stepsLog:[...log,{date:localDateStr(),steps:s}]});
    setSteps("");
  };
  const pct=Math.min(1,todaySteps/STEPS_GOAL);
  const fmtS=n=>n>=1000?`${(n/1000).toFixed(1)}k`:String(n);
  return(
    <div>
      <div style={{background:C.card,borderRadius:14,padding:"20px 16px",marginBottom:12,textAlign:"center"}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:72,color:todaySteps>=STEPS_GOAL?C.teal:C.orange,lineHeight:1}}>{todaySteps.toLocaleString()}</div>
        <div style={{fontSize:14,color:C.muted,marginBottom:16}}>of {STEPS_GOAL.toLocaleString()} steps today</div>
        <XPBar prog={pct} color={todaySteps>=STEPS_GOAL?C.teal:C.orange} h={10}/>
        {todaySteps>=STEPS_GOAL&&<div style={{fontSize:12,color:C.teal,fontWeight:700,letterSpacing:2,marginTop:8}}>GOAL REACHED ✓</div>}
      </div>
      <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:12}}>LOG TODAY'S STEPS</div>
        <div style={{display:"flex",gap:8}}>
          <input value={steps} onChange={e=>setSteps(e.target.value)} placeholder="Total steps today" type="number" style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"10px 12px",fontFamily:"inherit",fontSize:15}}/>
          <button onClick={doLog} style={{background:C.orange,border:"none",borderRadius:8,padding:"10px 18px",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,color:"#fff",cursor:"pointer"}}>LOG</button>
        </div>
      </div>
      <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:8}}>RECENT DAYS</div>
      {Array.from({length:7}).map((_,i)=>{
        const d=new Date();d.setDate(d.getDate()-i);const ds=localDateStr(d);
        const dayLog=log.filter(e=>localDateStr(parseLocalDate(e.date))===ds);
        const s=dayLog.length?dayLog[dayLog.length-1].steps:0;
        const lastIdx=dayLog.length?log.lastIndexOf(dayLog[dayLog.length-1]):-1;
        return(
          <div key={i} style={{background:C.card,borderRadius:10,padding:"10px 16px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:12,color:C.muted,width:88}}>{i===0?"Today":d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
            <div style={{flex:1,height:8,background:"#2A2A2A",borderRadius:99,overflow:"hidden"}}><div style={{width:`${Math.min(100,(s/STEPS_GOAL)*100)}%`,height:"100%",background:s>=STEPS_GOAL?C.teal:C.orange,borderRadius:99}}/></div>
            <div style={{fontSize:12,color:s>=STEPS_GOAL?C.teal:C.muted,fontWeight:700,width:40,textAlign:"right"}}>{s?fmtS(s):"0"}</div>
            {lastIdx>=0&&<button onClick={()=>onSave({stepsLog:log.filter((_,j)=>j!==lastIdx)})} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,lineHeight:1,padding:"0"}}>×</button>}
          </div>
        );
      })}
      <div style={{height:8}}/>
    </div>
  );
}

function WeightSection({data,onSave}){
  const [weight,setWeight]=useState("");

  const {label,col}=bmi?bmiCategory(bmi):{label:"--",col:C.muted};
  const doLog=()=>{
    const w=parseFloat(weight); if(isNaN(w)||w<50||w>500)return;
    onSave({weightLog:[...log,{date:localDateStr(),weight:w}],heightIn:parseInt(height)||69});
    setWeight("");
  };
  const chart=log.slice(-20);
  const weights=chart.map(e=>e.weight);
  const minW=weights.length?Math.min(...weights)-5:150;
  const maxW=weights.length?Math.max(...weights)+5:200;
  const range=maxW-minW||1;
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <div style={{background:C.card,borderRadius:12,padding:"16px",textAlign:"center"}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:44,color:C.text,lineHeight:1}}>{latest||"--"}</div><div style={{fontSize:10,color:C.muted,letterSpacing:1}}>POUNDS</div></div>
        <div style={{background:C.card,borderRadius:12,padding:"16px",textAlign:"center"}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:44,color:col,lineHeight:1}}>{bmi||"--"}</div><div style={{fontSize:10,color:col,letterSpacing:1}}>{label==="--"?"BMI":label.toUpperCase()}</div></div>
      </div>
      {chart.length>1&&(
        <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:12}}>WEIGHT TREND</div>
          <svg width="100%" height="60" style={{display:"block",overflow:"visible"}}>
            <polyline fill="none" stroke={C.orange} strokeWidth="2" strokeLinejoin="round" points={chart.map((e,i)=>`${(i/(chart.length-1))*95+2}%,${((maxW-e.weight)/range*50+5)}`).join(" ")}/>
            {chart.map((e,i)=><circle key={i} cx={`${(i/(chart.length-1))*95+2}%`} cy={(maxW-e.weight)/range*50+5} r="3" fill={C.orange}/>)}
          </svg>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.muted,marginTop:4}}>
            <span>{new Date(chart[0].date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
            <span>{new Date(chart[chart.length-1].date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
          </div>
        </div>
      )}
      <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:12}}>LOG WEIGHT</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input value={weight} onChange={e=>setWeight(e.target.value)} placeholder="Weight (lbs)" type="number" style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"10px 12px",fontFamily:"inherit",fontSize:15}}/>
          <button onClick={doLog} style={{background:C.orange,border:"none",borderRadius:8,padding:"10px 18px",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,color:"#fff",cursor:"pointer"}}>LOG</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:12,color:C.muted}}>Height:</div>
          <input value={height} onChange={e=>setHeight(e.target.value)} type="number" style={{width:70,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"6px 10px",fontFamily:"inherit",fontSize:14}}/>
          <div style={{fontSize:12,color:C.muted}}>in</div>
        </div>
      </div>
      {[...log].reverse().slice(0,10).map((e,i)=>{const actualIdx=log.length-1-i;const b=calcBMI(e.weight,data.heightIn||69);const {col:bc}=bmiCategory(b);return(
        <div key={i} style={{background:C.card,borderRadius:10,padding:"12px 16px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13,color:C.muted}}>{parseLocalDate(e.date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}><span style={{fontWeight:700}}>{e.weight} lbs</span><span style={{color:bc,fontSize:12}}>BMI {b}</span><button onClick={()=>onSave({weightLog:log.filter((_,j)=>j!==actualIdx)})} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 0 0 4px"}}>×</button></div>
        </div>
      );})}
      <div style={{height:8}}/>
    </div>
  );
}

          <div style={{fontSize:13,color:C.muted}}>{parseLocalDate(e.date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}><span style={{fontWeight:700,color:e.hours>=7?C.teal:C.gold}}>{e.hours}h</span><span style={{fontSize:12,color:qc}}>Q {e.quality}/5</span><button onClick={()=>onSave({sleepLog:log.filter((_,j)=>j!==actualIdx)})} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 0 0 4px"}}>×</button></div>
        </div>
      );})}
      <div style={{height:8}}/>
    </div>
  );

  const log=data.waterLog||[];
  const todayG=log.filter(e=>localDateStr(parseLocalDate(e.date))===todayStr()).reduce((s,e)=>s+e.glasses,0);
  const add=n=>{onSave({waterLog:[...log,{date:localDateStr(),glasses:n}]});};
  const removeLast=()=>{

function TrainFlow({onComplete,onBack}){
  const [step,setStep]=useState("window");
  const [win,setWin]=useState(null);
  const [energy,setEnergy]=useState(null);
  const [workout,setWorkout]=useState(null);
  if(step==="window")  return <WindowStep  onPick={w=>{setWin(w);setStep("energy");}} onBack={onBack}/>;
  if(step==="energy")  return <EnergyStep  onPick={e=>{setEnergy(e);setWorkout(suggestWorkout(win,e));setStep("workout");}} onBack={()=>setStep("window")}/>;
  if(step==="workout") return <WorkoutPreview workout={workout} onStart={()=>setStep("active")} onFree={()=>{setWorkout(null);setStep("active");}} onBack={()=>setStep("energy")}/>;
  if(step==="active")  return <ActiveWorkout workout={workout} win={win} energy={energy} onDone={onComplete} onBack={()=>setStep("workout")}/>;
  return null;
}

        <button key={o.id} onClick={()=>onPick(o.id)} style={{display:"flex",alignItems:"center",gap:16,background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"18px 16px",marginBottom:10,width:"100%",textAlign:"left",cursor:"pointer"}}>
          <div style={{fontSize:30}}>{o.icon}</div>

}

        {workout.exercises.map((ex,i)=>(

            <span style={{fontWeight:600}}>{ex.name}</span>

        {workout.isHIIT?"⚡ START HIIT TIMER":"▶ START WORKOUT"}
      </button>
      <button onClick={onFree} style={{width:"100%",background:"none",border:`1px solid ${C.border}`,borderRadius:14,padding:"14px",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,color:C.muted,cursor:"pointer"}}>FREESTYLE INSTEAD</button>

function ActiveWorkout({workout,win,energy,onDone,onBack}){
  const [start]=useState(Date.now());
  const [elapsed,setElapsed]=useState(0);
  useEffect(()=>{const id=setInterval(()=>setElapsed(Math.floor((Date.now()-start)/1000)),1000);return()=>clearInterval(id);},[start]);
  const finish=useCallback(()=>{
    const dur=Math.max(Math.round(elapsed/60),1);
    onDone({id:Date.now().toString(),date:localDateStr(),timeWindow:win,workoutId:workout?.id||"freestyle",name:workout?.name||"Freestyle Workout",type:workout?.type||"freestyle",energyLevel:energy,duration:dur,xp:workout?.xp||100});
  },[elapsed,win,workout,energy,onDone]);
  if(workout?.isHIIT)return <HIITTimer workout={workout} elapsed={elapsed} onFinish={finish} onBack={onBack}/>;
  return <ExerciseList workout={workout} elapsed={elapsed} onFinish={finish} onBack={onBack}/>;
}

function HIITTimer({workout,elapsed,onFinish,onBack}){
  const seq=useMemo(()=>buildHIITSeq(workout),[workout]);
  const [view,setView]=useState("ready");
  const [curr,setCurr]=useState({idx:0,timeLeft:seq[0]?.time||40});
  useEffect(()=>{
    if(view!=="running")return;
    const id=setTimeout(()=>{setCurr(prev=>{if(prev.timeLeft>1)return{...prev,timeLeft:prev.timeLeft-1};const nx=prev.idx+1;if(nx>=seq.length){setView("done");return prev;}return{idx:nx,timeLeft:seq[nx].time};});},1000);
    return()=>clearTimeout(id);
  },[view,curr,seq]);
  const item=seq[curr.idx]; const isWork=item?.phase==="work"; const pc=isWork?C.red:C.teal;
  if(view==="ready")return(<div style={{padding:"0 16px",textAlign:"center"}}><div style={{display:"flex",alignItems:"center",gap:12,padding:"20px 0 30px"}}><BackBtn onClick={onBack}/><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2}}>{workout.name}</div></div><div style={{fontSize:72,marginBottom:12}}>⚡</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:4,color:C.orange,marginBottom:8}}>HIIT TIMER READY</div><div style={{fontSize:13,color:C.muted,marginBottom:40}}>{workout.workSec}s work / {workout.restSec}s rest · {seq.length} intervals</div><button onClick={()=>setView("running")} style={{width:"100%",background:C.red,border:"none",borderRadius:14,padding:"18px",fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:8,color:"#fff",cursor:"pointer"}}>GO</button></div>);
  if(view==="done")return(<div style={{padding:"0 16px",textAlign:"center"}}><div style={{marginTop:56,fontSize:64,marginBottom:12}}>🔥</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:52,color:C.orange,letterSpacing:5,marginBottom:8}}>DONE.</div><div style={{fontSize:14,color:C.muted,fontStyle:"italic",marginBottom:40,lineHeight:1.6}}>That's what showing up looks like. Log it.</div><BigBtn onClick={onFinish}>LOG THIS WORKOUT</BigBtn></div>);
  return(
    <div style={{padding:"0 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",padding:"16px 0 12px"}}><div style={{fontSize:12,color:C.muted}}>⏱ {fmt(elapsed)}</div><div style={{fontSize:12,color:C.muted}}>INTERVAL {curr.idx+1}/{seq.length}</div></div>
      <div style={{background:isWork?"#1A0400":"#001A10",border:`2px solid ${pc}`,borderRadius:16,padding:"28px 16px",textAlign:"center",marginBottom:12}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:4,color:pc,marginBottom:6}}>{isWork?"WORK":"REST"}</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:108,color:pc,lineHeight:1}}>{curr.timeLeft}</div>
      </div>
      <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:8}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:2,marginBottom:4}}>{item?.name}</div>{item?.note&&<div style={{fontSize:13,color:C.muted}}>{item.note}</div>}<div style={{fontSize:11,color:C.muted,marginTop:6}}>ROUND {item?.round} OF {item?.totalRounds}</div></div>
      <XPBar prog={curr.idx/seq.length} color={pc} h={4}/>
    </div>
  );
}

function ExerciseList({workout,elapsed,onFinish,onBack}){
  const exs=workout?.exercises||[];
  const [done,setDone]=useState(exs.map(()=>false));
  const [free,setFree]=useState([]);
  const [name,setName]=useState(""); const [detail,setDetail]=useState("");
  const toggle=i=>setDone(prev=>{const n=[...prev];n[i]=!n[i];return n;});
  const add=()=>{if(!name.trim())return;setFree(p=>[...p,{name,sets:1,reps:detail||"—"}]);setName("");setDetail("");};
  const allDone=workout?(exs.length>0&&done.every(Boolean)):free.length>0;
  return(
    <div style={{padding:"0 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 0 16px"}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}><BackBtn onClick={onBack}/><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2}}>{workout?.name||"FREESTYLE"}</div></div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:C.muted}}>{fmt(elapsed)}</div>
      </div>
      {(workout?exs:free).map((ex,i)=>(
        <button key={i} onClick={()=>workout&&toggle(i)} style={{display:"flex",alignItems:"center",gap:12,background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:8,width:"100%",textAlign:"left",border:`1px solid ${done[i]?C.teal:C.border}`,cursor:workout?"pointer":"default",opacity:done[i]?0.5:1}}>
          {workout&&<div style={{width:26,height:26,borderRadius:"50%",background:done[i]?C.teal:"transparent",border:`2px solid ${done[i]?C.teal:"#444"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,color:"#fff"}}>{done[i]&&"✓"}</div>}
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{ex.name}</div><div style={{fontSize:12,color:C.muted}}>{ex.sets?`${ex.sets} × ${ex.reps}`:ex.duration||"—"}{ex.note?` · ${ex.note}`:""}</div></div>
        </button>
      ))}
      {!workout&&(
        <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,letterSpacing:2,marginBottom:10}}>ADD EXERCISE</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Exercise name" style={{display:"block",width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"10px 12px",marginBottom:8,fontFamily:"inherit",fontSize:14,boxSizing:"border-box"}}/>
          <input value={detail} onChange={e=>setDetail(e.target.value)} placeholder="Sets × reps, duration..." style={{display:"block",width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"10px 12px",marginBottom:8,fontFamily:"inherit",fontSize:14,boxSizing:"border-box"}}/>
          <button onClick={add} style={{background:"none",border:`1px solid ${C.orange}`,borderRadius:8,color:C.orange,padding:"8px 16px",fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:2,cursor:"pointer"}}>+ ADD</button>
        </div>
      )}
      <BigBtn onClick={onFinish} color={allDone?C.teal:C.orange}>{allDone?"✓ LOG WORKOUT":"FINISH & LOG"}</BigBtn>
      <div style={{height:8}}/>
    </div>
  );
}

function LogView({data}){
  const now=new Date();
  const weeks=Array.from({length:8},(_,i)=>{const s=new Date(now);s.setDate(now.getDate()-now.getDay()-(7-i-1)*7);s.setHours(0,0,0,0);const e=new Date(s);e.setDate(s.getDate()+7);return{label:s.toLocaleDateString("en-US",{month:"short",day:"numeric"}),cnt:data.workouts.filter(w=>{const d=parseLocalDate(w.date);return d>=s&&d<e;}).length};});
  const maxCnt=Math.max(...weeks.map(w=>w.cnt),WEEKLY_GOAL);
  return(
    <div style={{padding:"0 16px"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:3,padding:"20px 0 16px"}}>TRAINING LOG</div>
      <div style={{background:C.card,borderRadius:14,padding:"16px",marginBottom:12}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:16}}>WORKOUTS / WEEK — LAST 8 WEEKS</div>
        <div style={{position:"relative"}}>
          <div style={{position:"absolute",top:`${100-(WEEKLY_GOAL/maxCnt)*100}%`,left:0,right:0,borderTop:`1px dashed ${C.orange}44`,zIndex:1}}/>
          <div style={{display:"flex",alignItems:"flex-end",height:80,gap:4}}>
            {weeks.map((w,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}><div style={{fontSize:9,color:w.cnt?C.text:"transparent",marginBottom:2}}>{w.cnt}</div><div style={{width:"100%",background:i===7?C.orange:(w.cnt>=WEEKLY_GOAL?C.teal+"88":"#2A2A2A"),borderRadius:"3px 3px 0 0",height:`${Math.max((w.cnt/maxCnt)*60,w.cnt?4:0)}px`}}/></div>))}
          </div>
        </div>
      </div>
      <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:8}}>RECENT WORKOUTS</div>
      {data.workouts.length===0?(<div style={{background:C.card,borderRadius:14,padding:"40px 20px",textAlign:"center",color:C.muted}}><div style={{fontSize:36,marginBottom:8}}>📋</div>No workouts yet. Get after it.</div>):[...data.workouts].reverse().slice(0,25).map((w,i)=>(
        <div key={w.id||i} style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:1,marginBottom:4}}>{w.name}</div><div style={{display:"flex",gap:8,alignItems:"center"}}><TypeBadge type={w.type}/><span style={{fontSize:11,color:C.muted}}>{new Date(w.date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})} · {w.duration}m</span></div></div>
          <div style={{textAlign:"right"}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.gold}}>+{w.xp}</div><div style={{fontSize:9,color:C.muted}}>XP</div></div>
        </div>
      ))}
    </div>
  );
}

// ============================================================
// RANK VIEW
// ============================================================
function RankView({data}){
  const {n,name,next,prog}=getLevelInfo(data.totalXP);
  const unlocked=data.achievements||[];
  return(
    <div style={{padding:"0 16px"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:3,padding:"20px 0 16px"}}>RANK & ACHIEVEMENTS</div>
      <div style={{background:"#1A0D00",borderRadius:14,padding:"20px",marginBottom:12,border:`1px solid ${C.gold}44`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:56,color:C.gold,lineHeight:1}}>LVL {n}</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3}}>{name}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:C.gold}}>{data.totalXP}</div><div style={{fontSize:10,color:C.muted,letterSpacing:1}}>TOTAL XP</div></div>
        </div>
        <XPBar prog={prog} color={C.gold}/>
        {next?<div style={{fontSize:11,color:C.muted,marginTop:6}}>{next.min-data.totalXP} XP to {next.name}</div>:<div style={{fontSize:12,color:C.gold,fontStyle:"italic",marginTop:6}}>Maximum rank unlocked.</div>}
      </div>
      <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:10}}>ACHIEVEMENTS — {unlocked.length} / {ACHIEVEMENTS.length}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {ACHIEVEMENTS.map(a=>{const on=unlocked.includes(a.id);return(
          <div key={a.id} style={{background:C.card,borderRadius:12,padding:"14px",border:`1px solid ${on?C.gold+"44":C.border}`,opacity:on?1:0.35}}>
            <div style={{fontSize:26,marginBottom:6}}>{on?a.icon:"🔒"}</div>
            <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{a.name}</div>
            <div style={{fontSize:11,color:C.muted,marginBottom:on?4:0}}>{a.desc}</div>
            {on&&<div style={{fontSize:11,color:C.gold,fontWeight:700}}>+{a.xp} XP</div>}
          </div>
        );})}
      </div>
      <div style={{height:8}}/>
    </div>
  );
}

// ============================================================
// ROOT APP
// ============================================================
function App(){
  const [authState,setAuthState]=useState("loading"); // loading | signedin | signedout
  const [authError,setAuthError]=useState("");
  const [signInLoading,setSignInLoading]=useState(false);
  const [appData,setAppData]=useState(null);
  const [dataLoading,setDataLoading]=useState(false);
  const [tab,setTab]=useState("home");
  const [popup,setPopup]=useState(null);
  const [showSchedule,setShowSchedule]=useState(false);
  const [doneResult,setDoneResult]=useState(null);
  const [userEmail,setUserEmail]=useState("");
  const [saveIndicator,setSaveIndicator]=useState(null); // null | "saving" | "saved" | "error"
  const [syncError,setSyncError]=useState("");
  const [loadKey,setLoadKey]=useState(0);
  const [pullY,setPullY]=useState(0);
  const scrollRef=useRef(null);
  const touchStartY=useRef(0);
  const PULL_THRESHOLD=65;
  const onPullStart=e=>{if((scrollRef.current?.scrollTop||0)===0)touchStartY.current=e.touches[0].clientY;};
  const onPullMove=e=>{
    if((scrollRef.current?.scrollTop||0)>0){touchStartY.current=e.touches[0].clientY;return;}
    const dy=e.touches[0].clientY-touchStartY.current;
    if(dy>0)setPullY(Math.min(dy*0.5,PULL_THRESHOLD+16));
  };
  const onPullEnd=()=>{
    if(pullY>=PULL_THRESHOLD)setLoadKey(k=>k+1);
    setPullY(0);
  };

  // Init MSAL + check for existing session
  useEffect(()=>{
    (async()=>{
      try {
        const app = await getMsalApp();
        const accounts = app.getAllAccounts();
        if(accounts.length > 0){
          setUserEmail(accounts[0].username || "");
          setAuthState("signedin");
        } else {
          setAuthState("signedout");
        }
      } catch(e) {
        setAuthError("Init error: " + (e.message || String(e)));
        setAuthState("signedout");
      }
    })();
  },[]);

  // Load data from OneDrive when signed in
  useEffect(()=>{
    if(authState!=="signedin") return;
    (async()=>{
      setDataLoading(true);
      setSyncError("");
      try {
        const d = await loadFromOneDrive();
        if (d !== null) {
          setAppData(d); // real data from OneDrive — use it
        } else {
          setAppData(prev => prev || { ...DEFAULT_DATA }); // no file yet — preserve in-memory data
        }
      } catch(e) {
        if (e.needsLogin) {
          // Token expired or missing — send back to sign-in screen cleanly
          setAuthState("signedout");
          setAuthError("Session expired. Please sign in again.");
        } else {
          setSyncError(e.message || "Failed to load from OneDrive");
          setAppData(prev => prev || { ...DEFAULT_DATA });
        }
      }
      setDataLoading(false);
    })();
  },[authState, loadKey]);

  const signIn = async () => {
    setSignInLoading(true);
    setAuthError("");
    try {
      const app = await getMsalApp();
      // loginPopup works in iOS Safari and PWA standalone mode.
      // loginRedirect breaks PWAs — the return URL opens in Safari, not the PWA.
      const result = await app.loginPopup({ scopes: SCOPES });
      if(result && result.account){
        setUserEmail(result.account.username || "");
        setAuthState("signedin");
      }
    } catch(e) {
      setAuthError("Error: " + (e.message || e.errorCode || String(e)));
    } finally {
      setSignInLoading(false);
    }
  };

  const signOut = async () => {
    try {
      const app = await getMsalApp();
      await app.logoutPopup();
    } catch(e) {
      console.warn("Logout error:", e);
    }
    setAppData(null);
    setUserEmail("");
    setAuthState("signedout");
  };

  const mergeAndSave = useCallback(patch => {
    setAppData(prev => {
      if(!prev) return prev;
      const next = { ...prev, ...patch };
      setSaveIndicator("saving");
      saveToOneDrive(next).then(ok => {
        setSaveIndicator(ok ? "saved" : "error");
        setTimeout(() => setSaveIndicator(null), 2500);
      });
      return next;
    });
  }, []);

  const handleComplete = useCallback(result => {
    setAppData(prev => {
      if(!prev) return prev;
      const workouts = [...prev.workouts, result];
      let xp = (prev.totalXP || 0) + result.xp;
      const achievements = [...(prev.achievements || [])];
      const candidate = { ...prev, workouts, totalXP: xp, achievements };
      let firstNew = null;
      for(const a of ACHIEVEMENTS){
        if(!achievements.includes(a.id) && a.check(candidate)){
          achievements.push(a.id); xp += a.xp;
          if(!firstNew) firstNew = a;
        }
      }
      const next = { ...prev, workouts, totalXP: xp, achievements };
      setSaveIndicator("saving");
      saveToOneDrive(next).then(ok => {
        setSaveIndicator(ok ? "saved" : "error");
        setTimeout(() => setSaveIndicator(null), 2500);
      });
      if(firstNew) setPopup(firstNew);
      return next;
    });
    setDoneResult(result);
    setTab("done");
  }, []);

  // Loading / auth screens
  if(authState === "loading") return (
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:C.orange,letterSpacing:5}}>LOADING...</div>
    </div>
  );
  if(authState === "signedout") return <SignInScreen onSignIn={signIn} loading={signInLoading} error={authError}/>;
  if(dataLoading || !appData) return (
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:C.orange,letterSpacing:5}}>LOADING DATA...</div>
      <div style={{fontSize:12,color:C.muted}}>Fetching from OneDrive</div>
    </div>
  );

  const tabs=[{id:"home",icon:"⌂",label:"HOME"},{id:"train",icon:"⚡",label:"TRAIN"},{id:"body",icon:"◈",label:"BODY"},{id:"log",icon:"◎",label:"LOG"},{id:"rank",icon:"★",label:"RANK"}];

  return (
    <div style={{background:C.bg,height:"100vh",color:C.text,fontFamily:"'Rajdhani',sans-serif",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>

      {/* Save indicator */}
      {saveIndicator && (
        <div style={{position:"fixed",top:12,right:12,background:saveIndicator==="error"?C.red+"22":C.teal+"22",border:`1px solid ${saveIndicator==="error"?C.red:C.teal}44`,borderRadius:8,padding:"4px 10px",fontSize:10,color:saveIndicator==="error"?C.red:C.teal,zIndex:500,letterSpacing:1}}>
          {saveIndicator==="saving"?"SAVING...":saveIndicator==="error"?"SAVE FAILED":"SAVED ✓"}
        </div>
      )}

      {/* Sync error banner */}
      {syncError && (
        <div style={{position:"fixed",top:0,left:0,right:0,background:"#2A0000",borderBottom:`1px solid ${C.red}44`,padding:"10px 16px",zIndex:600,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{fontSize:11,color:C.red,flex:1}}>SYNC ERROR: {syncError}</div>
          <button onClick={()=>setLoadKey(k=>k+1)} style={{background:C.red,border:"none",borderRadius:6,padding:"4px 10px",fontSize:10,color:"#fff",cursor:"pointer",letterSpacing:1,whiteSpace:"nowrap"}}>RETRY</button>
          <button onClick={()=>setSyncError("")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 4px"}}>×</button>
        </div>
      )}

      {/* Achievement popup */}
      {popup&&(
        <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"#1A1200",border:`2px solid ${C.gold}`,borderRadius:14,padding:"16px 24px",zIndex:1000,textAlign:"center",minWidth:280,boxShadow:`0 0 50px ${C.gold}33`}}>
          <div style={{fontSize:36,marginBottom:4}}>{popup.icon}</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,color:C.gold,letterSpacing:3,marginBottom:4}}>ACHIEVEMENT UNLOCKED</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:2}}>{popup.name}</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:10}}>{popup.desc} · +{popup.xp} XP</div>
          <button onClick={()=>setPopup(null)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:11,letterSpacing:1}}>DISMISS</button>
        </div>
      )}

      {showSchedule&&<ScheduleModal data={appData} onSave={mergeAndSave} onClose={()=>setShowSchedule(false)}/>}

      {/* Main scroll area */}
      <div ref={scrollRef} onTouchStart={onPullStart} onTouchMove={onPullMove} onTouchEnd={onPullEnd} style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",paddingBottom:110,overscrollBehavior:"none"}}>
        {pullY>0&&<div style={{height:pullY,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",transition:pullY<4?"height 0.25s ease":"none"}}><div style={{fontSize:10,letterSpacing:2,fontWeight:700,color:pullY>=PULL_THRESHOLD?C.teal:C.muted}}>{pullY>=PULL_THRESHOLD?"RELEASE TO REFRESH":"PULL TO REFRESH"}</div></div>}
        {tab==="done"&&doneResult&&(
          <div style={{padding:"0 16px",textAlign:"center"}}>
            <div style={{marginTop:52,fontSize:64,marginBottom:10}}>💪</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:52,color:C.orange,letterSpacing:6,marginBottom:8}}>LOGGED.</div>
            <div style={{fontSize:15,color:C.muted,fontStyle:"italic",marginBottom:8,lineHeight:1.6}}>Permanent. Saved to OneDrive. Can't un-do it.</div>
            <div style={{fontSize:12,color:C.teal,marginBottom:32,letterSpacing:1}}>✓ SYNCED TO ONEDRIVE</div>
            <div style={{background:C.card,borderRadius:14,padding:"20px",display:"flex",justifyContent:"space-around",marginBottom:24}}>
              <div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:44,color:C.gold}}>{doneResult.xp}</div><div style={{fontSize:10,color:C.muted,letterSpacing:1}}>XP EARNED</div></div>
              <div style={{width:1,background:C.border}}/>
              <div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:44,color:C.orange}}>{doneResult.duration}</div><div style={{fontSize:10,color:C.muted,letterSpacing:1}}>MINUTES</div></div>
            </div>
            <BigBtn onClick={()=>{setTab("home");setDoneResult(null);}}>BACK TO DASHBOARD</BigBtn>
            <div style={{height:8}}/>
            <button onClick={()=>{setTab("body");setDoneResult(null);}} style={{width:"100%",background:"none",border:`1px solid ${C.border}`,borderRadius:14,padding:"13px",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,color:C.muted,cursor:"pointer",marginBottom:16}}>LOG WEIGHT / SLEEP / WATER</button>
          </div>
        )}
        {tab==="home"  && <HomeView  data={appData} onStart={()=>setTab("train")} onSchedule={()=>setShowSchedule(true)} userEmail={userEmail} onSignOut={signOut}/>}
        {tab==="train" && <TrainFlow onComplete={handleComplete} onBack={()=>setTab("home")}/>}
        {tab==="body"  && <BodyView  data={appData} onSave={mergeAndSave}/>}
        {tab==="log"   && <LogView   data={appData}/>}
        {tab==="rank"  && <RankView  data={appData}/>}
      </div>

      {/* Bottom nav — floating card */}
      <div style={{position:"absolute",bottom:"calc(env(safe-area-inset-bottom) + 16px)",left:16,right:16,background:C.card,borderRadius:20,display:"flex",zIndex:50,padding:"6px 0",boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
            <div style={{fontSize:18,opacity:tab===t.id?1:0.3,transition:"opacity 0.2s"}}>{t.icon}</div>
            <div style={{fontSize:9,color:tab===t.id?C.orange:C.muted,fontWeight:700,letterSpacing:2,transition:"color 0.2s"}}>{t.label}</div>
            {tab===t.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,background:C.orange,borderRadius:"0 0 2px 2px"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

// Register service worker
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
  </script>
</body>
